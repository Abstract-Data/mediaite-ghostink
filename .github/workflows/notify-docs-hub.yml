name: Notify docs-hub

# Pings Abstract-Data/docs-hub whenever docs/ changes on main, so the hub
# re-runs its multirepo aggregation immediately instead of waiting for the
# scheduled sync.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/notify-docs-hub.yml"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync to docs-hub
        env:
          GH_TOKEN: ${{ secrets.DOCS_HUB_DISPATCH_TOKEN }}
        run: |
          curl -sSf \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Abstract-Data/docs-hub/dispatches \
            -d '{"event_type":"subrepo-update","client_payload":{"repo":"mediaite-ghostink","ref":"${{ github.sha }}"}}'
