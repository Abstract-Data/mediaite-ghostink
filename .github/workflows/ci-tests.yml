name: Tests

on:
  workflow_call:

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev --extra tui

      - name: Install spaCy English model (Phase 4 features)
        run: uv run python -m spacy download en_core_web_md

      # Coverage target and fail_under come from pyproject.toml addopts + [tool.coverage.*]
      # (--cov=forensics). Do not pass a second --cov=src here; it skews coverage.json vs local.
      - name: Run tests with coverage
        run: >-
          uv run pytest tests/
          --junitxml=test-results.xml
          --cov-report=json:coverage.json
          --cov-report=term-missing
          -v

      - name: Report per-module coverage (analysis subsection)
        run: uv run python scripts/report_analysis_module_coverage.py coverage.json

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            test-results.xml
            coverage.json
          retention-days: 5

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --frozen --extra dev --extra tui

      - name: Install spaCy English model (feature extraction)
        run: uv run python -m spacy download en_core_web_md

      - name: Run integration-marked tests
        run: uv run pytest tests/ -m integration -v --no-cov
