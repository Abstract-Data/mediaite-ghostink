# spaCy pipeline used for feature extraction and preflight validation.
# Changing this requires: `uv run python -m spacy download <model>`.
spacy_model = "en_core_web_md"

[scraping]
rate_limit_seconds = 0.5
rate_limit_jitter = 0.5
respect_robots_txt = true
user_agent = "AI-Writing-Forensics/1.0 (research)"
max_concurrent = 3
max_retries = 3
retry_backoff_seconds = 5.0
# Near-duplicate threshold (hamming distance over 128-bit simhash); lower is stricter.
simhash_threshold = 3
# When true, the metadata phase pulls `content.rendered` (100 posts per request)
# and writes body text inline, so `fetch_articles` becomes a no-op. Trades
# per-article OG/ld+json metadata for ~100× fewer HTTP requests.
bulk_fetch_mode = true
# Optional inclusive calendar-year window for WordPress wp/v2/posts (after/before).
# Both must be set together, or omit both for full history. Override via CLI or
# FORENSICS_SCRAPING__POST_YEAR_MIN / FORENSICS_SCRAPING__POST_YEAR_MAX.
# post_year_min = 2019
# post_year_max = 2025

[analysis]
rolling_windows = [30, 90]
significance_threshold = 0.05
multiple_comparison_method = "benjamini_hochberg"
bootstrap_iterations = 200
min_articles_for_period = 5
embedding_model = "sentence-transformers/all-MiniLM-L6-v2"
embedding_model_version = "v2.0"
changepoint_methods = ["pelt", "bocpd"]
# Phase 15 F0 — PELT cost model. Default flipped from ``rbf`` (O(n²) kernel,
# 99.2% of analysis wall-clock per the Apr 24 2026 profile) to ``l2`` (1-D
# mean-shift, O(n)); ``l1`` available for outlier-robust runs and ``rbf``
# retained for comparison/audit. See docs/settings_phase15.md.
pelt_cost_model = "l2"
# Phase 15 A — BOCPD detection semantics. ``map_reset`` is the current default:
# emit a CP when the posterior MAP run-length drops below ``map_drop_ratio``×
# its previous value, subject to ``min_run_length`` warmup, ``reset_cooldown``
# refractory period, and ``merge_window`` adjacent-emit collapse. The legacy
# ``p_r0_legacy`` mode (threshold-compare ``P(r=0)``) is preserved for
# replication only — under constant-hazard A&M that quantity is algebraically
# pinned to the hazard rate and cannot fire (see GUARDRAILS.md).
bocpd_detection_mode = "map_reset"
# Fractional drop in the MAP run-length that signals a reset. Lower = stricter
# (only big collapses count); higher = noisier.
bocpd_map_drop_ratio = 0.5
# Warmup gate: prev MAP run-length must clear this bar before any emit. Also
# acts as the minimum series length (n must be >= max(6, min_run_length+2)).
bocpd_min_run_length = 5
# Refractory period in timesteps; suppress emits within K of the previous emit.
bocpd_reset_cooldown = 3
# Multi-reset collapse window: merge adjacent emits within W timesteps and keep
# the highest-confidence one. 0 disables merging.
bocpd_merge_window = 2
# Phase 15 A4 — Posterior predictive choice. ``true`` = NIG → Student-t
# (Murphy 2007 §7.6); ``false`` = legacy Normal-known-σ² path. Default on:
# Student-t refreshes scale per-segment so long-established segments don't
# read new observations through a frozen σ².
bocpd_student_t = true
# Phase 15 B3 — convergence ratio is now interpreted against feature *families*
# (≈8 independent axes). Default lowered from 0.60 → 0.50 (4-of-8 axes).
convergence_min_feature_ratio = 0.50
# Phase 15 J5 — which CP stream feeds convergence.
convergence_cp_source = "section_adjusted"
# Phase 15 C — apply BH correction per feature family rather than per author.
fdr_grouping = "family"
# Phase 15 E — Pipeline B scoring mode. ``percentile`` uses per-author velocity
# baseline (math-floor in ``legacy`` confirmed via DEBUG run on isaac-schorr,
# 2026-04-24: peak_signal=sim_signal=ai_signal=0 for most windows under the
# legacy standard-score formula `(max_vel − v_mean) / (2 σ_v)`).
pipeline_b_mode = "percentile"
# Phase 15 J5 — residualize feature series against one-hot sections before CPD.
section_residualize_features = false
# Phase 15 J — gating thresholds for section-conditioned diagnostics.
section_min_articles = 50
min_articles_per_section_for_residualize = 10
# Phase 15 G — parallelism. ``max_workers`` null means ``os.cpu_count() - 1``.
# max_workers = 4
feature_workers = 1
# Convergence permutation null (Phase 12 §5b) — logs empirical p-values; off by default (CPU).
# convergence_use_permutation = false
# convergence_permutation_iterations = 1000
# convergence_permutation_seed = 42

[survey]
# Phase 12 §1 — blind newsroom-wide survey mode thresholds.
min_articles = 50
min_span_days = 730
min_words_per_article = 200
min_articles_per_year = 12.0
require_recent_activity = true
recent_activity_days = 180
# Phase 15 D — exclude shared-byline accounts (mediaite-staff / mediaite).
exclude_shared_bylines = true
# Phase 15 J2 — exclude advertorial / syndicated sections from stylometry baseline.
excluded_sections = ["sponsored", "partner-content", "crosspost"]

[features]
# Phase 15 Step 0.3 — feature parquet schema version. Bump when the schema
# gains a required column; readers refuse older parquets until migrated.
feature_parquet_schema_version = 2

[probability]
# Phase 9 — token-level probability features (perplexity, burstiness, Binoculars).
# Requires the `probability` optional-extra:  uv sync --extra probability
reference_model = "gpt2"
reference_model_revision = "e7da7f2"
binoculars_model_base = "tiiuae/falcon-7b"
binoculars_model_instruct = "tiiuae/falcon-7b-instruct"
binoculars_enabled = false
max_sequence_length = 1024
sliding_window_stride = 512
batch_size = 16
device = "auto"
low_ppl_threshold = 20.0

[baseline]
# Phase 10 — AI baseline generation via local Ollama models.
# Requires the `baseline` optional-extra:  uv sync --extra baseline
# Tags must exist locally (`ollama list`); Phase 9 probability uses HF separately (`uv sync --extra probability`).
ollama_base_url = "http://localhost:11434"
models = ["llama3.2:latest"]
temperatures = [0.0, 0.8]
articles_per_cell = 30
max_tokens = 1500
request_timeout = 120

[chain_of_custody]
verify_corpus_hash = true
verify_raw_archives = true
log_all_generations = true

[report]
title = "Writing Forensics Analysis"
output_format = "both"
include_sections = []
chart_theme = "plotly_white"
cloudflare_deploy = false
