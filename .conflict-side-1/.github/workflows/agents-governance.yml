name: agents-governance

on:
  pull_request:
    paths:
      - "AGENTS*.md"
      - "scripts/lint_agents_md.py"
      - ".github/workflows/agents-governance.yml"
  push:
    paths:
      - "AGENTS*.md"
      - "scripts/lint_agents_md.py"
      - ".github/workflows/agents-governance.yml"

jobs:
  lint-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AGENTS governance linter
        run: python scripts/lint_agents_md.py
